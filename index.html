<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Приглашение на торжество | Сагын & Айнуру</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;400&family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body, html {
            height: 100%;
            background-color: #FAF9F6; /* Шелковый белый */
            color: #2A2F35;
            font-family: 'Cormorant Garamond', serif;
            overflow: hidden;
            perspective: 1500px; /* Для 3D эффекта открывания */
        }

        /* --- АНИМАЦИОННЫЕ ФОНЫ --- */
        .rose-petal {
            position: fixed;
            top: -20px;
            pointer-events: none;
            z-index: 9999;
            width: 12px;
            height: 12px;
            background: radial-gradient(#d63031, #b21f1f);
            border-radius: 15px 0 15px 15px;
            opacity: 0.8;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% { top: -20px; transform: translateX(0) rotate(0deg); opacity: 0.8; }
            100% { top: 105vh; transform: translateX(150px) rotate(360deg); opacity: 0.2; }
        }

        .heart-particle {
            position: fixed;
            pointer-events: none;
            z-index: 10001;
            font-size: 24px;
            color: #d63031;
            user-select: none;
            will-change: transform, opacity;
        }

        /* --- КОНВЕРТ И ЭФФЕКТ ОТКРЫТИЯ --- */
        #envelope-wrapper {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #EADEC9 0%, #D6C7B1 50%, #BFA785 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            transition: opacity 1s, transform 1s;
        }

        /* Фактурная бумага конверта */
        .envelope-paper {
            position: absolute;
            width: 100%; height: 100%;
            background-color: #f4efeb;
            background-image: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAQAAAAECAYAAACp8Z5+AAAAIklEQVQIW2NkQAKrVq36z8gAFWNgYGBkgAsgFQMjg9WqVQAZzggL9a7O2QAAAABJRU5ErkJggg==');
            border-radius: 8px;
            box-shadow: 0 30px 70px rgba(0,0,0,0.15), inset 0 0 20px rgba(0,0,0,0.02);
            transition: transform 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Клапаны конверта (в сложенном виде) */
        .flap {
            position: absolute;
            background-color: #f4efeb;
            background-image: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAQAAAAECAYAAACp8Z5+AAAAIklEQVQIW2NkQAKrVq36z8gAFWNgYGBkgAsgFQMjg9WqVQAZzggL9a7O2QAAAABJRU5ErkJggg==');
            border: 1px solid rgba(0,0,0,0.05);
            transition: transform 1s, opacity 0.5s;
        }

        /* Верхний клапан */
        .flap-top {
            width: 100%; height: 50%;
            top: 0; left: 0;
            border-radius: 8px 8px 0 0;
            clip-path: polygon(0 0, 100% 0, 50% 100%);
            transform-origin: top;
            z-index: 3;
        }

        /* Нижний клапан */
        .flap-bottom {
            width: 100%; height: 50%;
            bottom: 0; left: 0;
            border-radius: 0 0 8px 8px;
            clip-path: polygon(50% 0, 0 100%, 100% 100%);
            transform-origin: bottom;
            z-index: 2;
        }

        /* Боковые клапаны */
        .flap-left {
            width: 50%; height: 100%;
            top: 0; left: 0;
            border-radius: 8px 0 0 8px;
            clip-path: polygon(0 0, 100% 50%, 0 100%);
            transform-origin: left;
            z-index: 1;
        }
        .flap-right {
            width: 50%; height: 100%;
            top: 0; right: 0;
            border-radius: 0 8px 8px 0;
            clip-path: polygon(100% 0, 100% 100%, 0 50%);
            transform-origin: right;
            z-index: 1;
        }

        /* Контейнер для складывания всех частей */
        .envelope-fold {
            width: 420px; height: 260px;
            max-width: 90%;
            position: relative;
            cursor: pointer;
            transform-style: preserve-3d;
            transition: transform 0.4s;
        }
        .envelope-fold:hover { transform: scale(1.02); }

        /* --- СЕРДЕЧКО ПОСЕРЕДИНЕ (Крепеж) --- */
        .wax-seal {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 80px; height: 80px;
            background: radial-gradient(#E6C280, #C79D4C);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #FFF;
            font-family: 'Great Vibes', cursive;
            font-size: 2.3rem;
            text-shadow: 1px 2px 4px rgba(0,0,0,0.2);
            box-shadow: 0 8px 20px rgba(199, 157, 76, 0.4);
            border: 2px solid #D4AF37;
            z-index: 10; /* Поверх всех клапанов */
            transition: opacity 0.5s;
        }

        /* Текст на конверте */
        .envelope-title {
            font-family: 'Great Vibes', cursive;
            font-size: 2.5rem;
            color: #9E8454;
            position: absolute;
            top: 20%; left: 50%;
            transform: translateX(-50%);
            z-index: 4;
            opacity: 0;
            transition: opacity 0.5s 0.8s;
        }
        .envelope-text {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.8rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #A39E93;
            position: absolute;
            bottom: 20%; left: 50%;
            transform: translateX(-50%);
            font-weight: 400;
            z-index: 4;
            opacity: 1;
            transition: opacity 0.5s;
        }

        /* --- СОСТОЯНИЕ "ОТКРЫТО" --- */
        body.envelope-opened #envelope-wrapper {
            pointer-events: none; /* Разрешаем клики по контенту */
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%); /* Более светлый фон контента */
        }

        /* Внутренняя часть конверта (фактура бумаги) */
        body.envelope-opened .envelope-paper {
            transform: scale(1.1);
        }

        /* Убираем крепеж и текст */
        body.envelope-opened .wax-seal,
        body.envelope-opened .envelope-text {
            opacity: 0;
        }

        /* Показываем заголовок "Приглашение" */
        body.envelope-opened .envelope-title {
            opacity: 1;
        }

        /* Раскрываем клапаны */
        body.envelope-opened .flap-top {
            transform: rotateX(-180deg);
        }
        body.envelope-opened .flap-bottom {
            transform: rotateX(180deg);
            opacity: 0; /* Нижний клапан скрываем, чтобы не мешал */
        }
        body.envelope-opened .flap-left {
            transform: rotateY(-180deg);
        }
        body.envelope-opened .flap-right {
            transform: rotateY(180deg);
        }

        /* Разрешаем скролл контента */
        body.envelope-opened {
            overflow: auto;
        }

        /* --- ГЛАВНЫЙ КОНТЕНТ (ПИСЬМО НА ПЕРЕДНЕМ ПЛАНЕ) --- */
        #main-content {
            position: relative;
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 0;
            z-index: 1; /* Между фоном конверта и самим конвертом wrapper */
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 1s 1s, transform 1s 1s;
        }

        body.envelope-opened #main-content {
            opacity: 1;
            transform: translateY(0);
        }

        /* Элементы письма */
        .content-card {
            max-width: 550px;
            width: 90%;
            background: #FFFFFF; /* Чисто белое письмо */
            padding: 40px 30px;
            margin: 20px 0;
            border: 2px solid #FDF6E3; /* Золотистая рамка */
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
            border-radius: 2px;
            position: relative;
        }

        /* ТЕКСТОВЫЕ СТИЛИ НА ПИСЬМЕ */
        h2 { font-size: 1.8rem; color: #9E8454; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 25px; }
        
        .invitation-text {
            font-size: 1.25rem;
            line-height: 1.9;
            font-style: italic;
            color: #3A4146;
        }

        .hosts-title { font-family: 'Great Vibes', cursive; font-size: 2.3rem; color: #9E8454; margin-top: 15px; }
        .hosts-names { font-size: 1.6rem; letter-spacing: 1px; font-weight: 600; margin-top: 5px; color: #2A2F35; }

        /* КНОПКИ НАВИГАЦИИ */
        .nav-box { display: flex; justify-content: center; gap: 20px; margin-top: 30px; }
        .btn-nav {
            padding: 10px 25px;
            background: transparent;
            border: 1px solid #9E8454;
            color: #9E8454;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
        }
        .btn-nav:hover { background: #9E8454; color: #FFF; }

        /* Многостраничность контента */
        .page { display: none; width: 100%; flex-direction: column; align-items: center;}
        .page.active { display: flex; animation: fadeInPage 0.8s ease forwards; }

        @keyframes fadeInPage { from { opacity: 0; } to { opacity: 1; } }

        /* Декоративные розы внутри письма */
        .content-card-decor {
            position: absolute;
            width: 120px; height: 120px;
            background-size: contain;
            background-repeat: no-repeat;
            opacity: 0.15;
            pointer-events: none;
        }
        .decor-top-left { top: 10px; left: 10px; background-image: url('https://images.unsplash.com/photo-1533616688419-b7a585564566?q=80&w=300'); transform: scaleX(-1); }
        .decor-bottom-right { bottom: 10px; right: 10px; background-image: url('https://images.unsplash.com/photo-1533616688419-b7a585564566?q=80&w=300'); }

        /* ТАЙМЕР ОБРАТНОГО ОТСЧЕТА */
        .timer-grid { display: flex; justify-content: center; gap: 15px; margin: 25px 0; }
        .timer-item { background: #FFF; border: 1px solid #EAE5DC; padding: 12px; min-width: 65px; }
        .timer-num { font-size: 1.5rem; color: #2A2F35; font-weight: bold; }
        .timer-label { font-family: 'Montserrat', sans-serif; font-size: 0.65rem; color: #8A94A0; text-transform: uppercase; }

        /* ПАЛИТРА ДРЕСС-КОДА */
        .palette { display: flex; justify-content: center; gap: 12px; margin-top: 15px; }
        .circle { width: 35px; height: 35px; border-radius: 50%; border: 1px solid #E2E8F0; }

        /* КНИГА ПОЖЕЛАНИЙ */
        .wish-input, .wish-text { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #D6CEBF; background: #FFF; font-family: 'Montserrat', sans-serif; }
        .wish-text { height: 80px; resize: none; }
        .wishes-output { max-height: 180px; overflow-y: auto; text-align: left; font-size: 0.95rem; margin-top: 15px; }
        .wish-item { padding: 10px; border-bottom: 1px solid #EFECE6; font-style: italic; background: rgba(255,255,255,0.5); margin-bottom: 5px; }

        /* ЗАГРУЗКА ФОТО */
        .upload-zone { border: 2px dashed #9E8454; padding: 30px; cursor: pointer; background: #FFF; margin-bottom: 15px; }
        .gallery-preview { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; max-height: 180px; overflow-y: auto; }
        .gallery-preview img { width: 100%; height: 70px; object-fit: cover; }

        #audio-toggle { position: fixed; bottom: 25px; right: 25px; background: #FFF; border: 1px solid #9E8454; width: 45px; height: 45px; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; z-index: 9999; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

    <audio id="bg-music" loop>
        <source src="https://assets.mixkit.co/music/preview/mixkit-beautiful-dream-493.mp3" type="audio/mpeg">
    </audio>

    <div id="audio-toggle" onclick="toggleAudio()">🎵</div>

    <div id="envelope-wrapper">
        <div class="envelope-fold" id="envelope-fold" onclick="openEnvelope(event)">
            <div class="envelope-paper"></div>
            <div class="envelope-title">Приглашение</div>
            
            <div class="flap flap-top"></div>
            <div class="flap flap-bottom"></div>
            <div class="flap flap-left"></div>
            <div class="flap flap-right"></div>
            
            <div class="wax-seal" id="wax-seal">S&A</div>
            
            <div class="envelope-text" id="envelope-text">Нажмите, чтобы открыть</div>
        </div>
    </div>

    <main id="main-content">
