<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Приглашение на торжество | Сагын & Айнуру</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Montserrat:wght@300;400;500;600&family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body, html {
            height: 100%;
            background-color: #FAF9F6;
            color: #2A2F35;
            font-family: 'Cormorant Garamond', serif;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* АНИМАЦИЯ ЛЕПЕСТКОВ РОЗ */
        .rose-petal {
            position: fixed;
            top: -20px;
            pointer-events: none;
            z-index: 9999;
            background: radial-gradient(circle at 40% 40%, #ff8fa3, #ff4d6d 70%, #c9184a);
            border-radius: 15px 0 15px 15px;
            opacity: 0.75;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
            animation: fall linear infinite;
        }
        @keyframes fall {
            0% { top: -20px; transform: translateX(0) rotate(0deg) scale(0.8); opacity: 0.8; }
            50% { transform: translateX(60px) rotate(180deg) scale(1); opacity: 0.75; }
            100% { top: 105vh; transform: translateX(110px) rotate(360deg) scale(0.7); opacity: 0; }
        }

        /* ЭФФЕКТ СЕРДЕЧЕК ПРИ ОТКРЫТИИ */
        .heart-particle {
            position: fixed;
            pointer-events: none;
            z-index: 10001;
            will-change: transform, opacity;
            background: radial-gradient(circle at 35% 35%, #ff7675, #d63031);
            clip-path: path('M12 4.419c-2.426-3.484-7.208-3.484-9.633 0-2.508 3.612-2.508 9.471 0 13.084l9.633 9.497 9.633-9.497c2.508-3.613 2.508-9.472 0-13.084-2.425-3.484-7.207-3.484-9.633 0z');
            opacity: 1;
            transition: transform 2s cubic-bezier(0.1, 0.8, 0.3, 1), opacity 2s ease-out;
        }

        /* ЭКРАН С КОНВЕРТОМ */
        #envelope-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #EADEC9 0%, #D6C7B1 50%, #BFA785 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            cursor: pointer;
            transition: opacity 0.5s ease-in-out, transform 0.5s ease-in-out;
        }

        .envelope {
            width: 440px; 
            height: 280px;
            max-width: 92%;
            background: #FFFFFF; 
            box-shadow: 0 35px 85px rgba(0,0,0,0.18), inset 0 0 20px rgba(0,0,0,0.02);
            border-radius: 12px;
            border: 1px solid #EAE2D5;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .envelope::before {
            content: '';
            position: absolute;
            top: 14px; left: 14px; right: 14px; bottom: 14px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            pointer-events: none;
        }

        .heart-seal-wrapper {
            width: 110px;
            height: 100px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            filter: drop-shadow(0 8px 15px rgba(178, 31, 31, 0.45));
            transition: transform 0.3s ease;
            margin-bottom: 10px;
        }
        .envelope:hover .heart-seal-wrapper { transform: scale(1.08); }

        .heart-svg-seal {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0; left: 0;
        }

        .heart-seal-text {
            position: relative;
            z-index: 2;
            color: #F9E7B9; 
            font-family: 'Great Vibes', cursive;
            font-weight: bold;
            font-size: 2.1rem;
            text-shadow: 1px 2px 4px rgba(0,0,0,0.4);
            margin-top: -6px;
        }

        .envelope-text {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.75rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #8A8475;
            font-weight: 500;
            margin-top: 15px;
        }

        /* ПАНЕЛЬ МУЗЫКИ */
        #cozy-music-bar {
            position: fixed;
            top: 30px; 
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid rgba(158, 132, 84, 0.35);
            padding: 10px 24px;
            border-radius: 30px;
            display: flex; 
            align-items: center;
            gap: 12px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);
            z-index: 10005; 
            cursor: pointer;
            transition: all 0.3s ease;
        }
        #cozy-music-bar:hover {
            border-color: #9E8454;
            background: #FFFFFF;
            transform: translateX(-50%) scale(1.03);
        }
        .music-bar-text {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #9E8454;
            font-weight: 600;
        }
        .music-btn-circle {
            width: 30px;
            height: 30px;
            background: #9E8454;
            color: #FFFFFF;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0.85rem;
        }

        /* МНОГОСТРАНИЧНАЯ СИСТЕМА */
        .page {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            padding: 100px 20px 40px 20px; 
            overflow-y: auto;
            text-align: center;
            background-color: #FAF9F6; 
            justify-content: center;
            align-items: center;
            flex-direction: column;
            opacity: 0;
            z-index: 5;
        }
        .page.active { display: flex !important; animation: fadeInPage 0.7s ease-out forwards; }
        @keyframes fadeInPage { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .content-card {
            width: 100%;
            max-width: 550px;
            margin: auto;
            padding: 45px 30px;
            background: #FFFFFF;
            border: 1px solid rgba(158, 132, 84, 0.2);
            box-shadow: 0 20px 50px rgba(158, 132, 84, 0.06);
            border-radius: 4px;
            position: relative;
        }

        h2 { font-size: 1.8rem; color: #9E8454; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 25px; font-weight: 400; }
        
        .invitation-text {
            font-size: 1.2rem;
            line-height: 1.8;
            font-style: italic;
            color: #2A2F35;
            margin-bottom: 15px;
        }

        .couple-names { font-family: 'Great Vibes', cursive; font-size: 3.3rem; color: #9E8454; margin: 15px 0; }
        .hosts-title { font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; text-transform: uppercase; letter-spacing: 2px; color: #8A8475; margin-top: 25px; }
        .hosts-names { font-size: 1.5rem; letter-spacing: 1px; font-weight: 600; margin-top: 5px; color: #2A2F35; }
        .hosts-status { font-size: 0.95rem; font-style: italic; color: #8A8475; margin-top: 2px; }

        /* НАВИГАЦИЯ */
