    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body, html {
            height: 100%;
            background-color: #FFFFFF; /* Блистательный белый фон с самого начала до конца */
            color: #2A2F35;
            font-family: 'Cormorant Garamond', serif;
            overflow-x: hidden;
        }

        /* КРАСИВЫЙ РЕАЛИСТИЧНЫЙ СПЕЦЭФФЕКТ ПРИ ОТКРЫТИИ (Аниме-сердечки) */
        .burst-particle {
            position: fixed;
            pointer-events: none;
            z-index: 10001;
            will-change: transform, opacity;
            background: radial-gradient(circle at 35% 35%, #ff7675, #d63031);
            clip-path: path('M12 4.419c-2.426-3.484-7.208-3.484-9.633 0-2.508 3.612-2.508 9.471 0 13.084l9.633 9.497 9.633-9.497c2.508-3.613 2.508-9.472 0-13.084-2.425-3.484-7.207-3.484-9.633 0z');
            box-shadow: 0 0 15px rgba(214, 48, 49, 0.6);
            opacity: 1;
            transition: transform 2.5s cubic-bezier(0.1, 0.8, 0.3, 1), opacity 2.5s ease-out;
        }

        /* АНИМАЦИЯ ЛЕПЕСТКОВ НА ЗАДНЕМ ФОНЕ (Ярче и больше) */
        .rose-petal {
            position: fixed;
            top: -20px;
            pointer-events: none;
            z-index: 9999;
            background: radial-gradient(circle at 40% 40%, #ff8fa3, #ff4d6d 70%, #c9184a);
            border-radius: 15px 0 15px 15px;
            opacity: 0.85;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
            animation: fall linear infinite;
        }
        @keyframes fall {
            0% { top: -20px; transform: translateX(0) rotate(0deg) scale(0.8); opacity: 0.9; }
            50% { transform: translateX(80px) rotate(180deg) scale(1.1); opacity: 0.85; }
            100% { top: 105vh; transform: translateX(130px) rotate(360deg) scale(0.8); opacity: 0; }
        }

        /* ЭКРАН С ПЕРВОНАЧАЛЬНЫМ КОНВЕРТОМ */
        #envelope-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #EADEC9 0%, #D6C7B1 50%, #BFA785 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            transition: all 1.2s ease-in-out;
        }

        .envelope {
            width: 460px; 
            height: 300px;
            max-width: 92%;
            background: #FFFFFF; 
            box-shadow: 0 40px 90px rgba(0,0,0,0.22), inset 0 0 30px rgba(0,0,0,0.02);
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            cursor: pointer;
            position: relative;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid #EAE2D5;
        }
        .envelope:hover { transform: scale(1.03); }

        .envelope::before {
            content: '';
            position: absolute;
            top: 12px; left: 12px; right: 12px; bottom: 12px;
            border: 1px solid rgba(212, 175, 55, 0.5);
            pointer-events: none;
        }

        /* СУРГУЧНОЕ КРАСНОЕ СЕРДЦЕ СТРОГО ПО ЦЕНТРУ */
        .heart-seal {
            width: 110px;
            height: 100px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            justify-content: center;
            align-items: center;
            filter: drop-shadow(0 10px 20px rgba(178, 31, 31, 0.4));
            transition: transform 0.3s ease;
            z-index: 10;
        }
        .envelope:hover .heart-seal { transform: translate(-50%, -50%) scale(1.08); }

        .heart-seal-shape {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #E64C4C, #B21F1F, #7F0F0F);
            clip-path: path('M12 4.435c-1.989-5.399-12-4.597-12 3.568 0 4.068 3.06 6.028 12 14 8.94-7.972 12-9.932 12-14 0-8.165-10.011-8.967-12-3.568z');
            transform: scale(4.4);
            z-index: 1;
        }

        /* БУКВЫ С И А */
        .heart-seal-text {
            position: relative;
            z-index: 2;
            color: #FFF;
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            font-size: 1.4rem;
            letter-spacing: 3px;
            text-shadow: 1px 2px 5px rgba(0,0,0,0.4);

            margin-left: 3px;
        }
