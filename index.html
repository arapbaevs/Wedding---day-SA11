<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Приглашение на торжество | Сагын & Айнуру</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Montserrat:wght@400;500;600&family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body, html {
            height: 100%;
            background-color: #FFFFFF; /* Кристально белый фон для страниц */
            color: #2A2F35;
            font-family: 'Cormorant Garamond', serif;
            overflow: hidden;
        }

        /* АНИМАЦИЯ ЛЕПЕСТКОВ РОЗ */
        .rose-petal {
            position: fixed;
            top: -20px;
            pointer-events: none;
            z-index: 9999;
            background: radial-gradient(circle at 40% 40%, #ff8fa3, #ff4d6d 70%, #c9184a);
            border-radius: 15px 0 15px 15px;
            opacity: 0.85;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
            animation: fall linear infinite;
        }
        @keyframes fall {
            0% { top: -20px; transform: translateX(0) rotate(0deg) scale(0.8); opacity: 0.9; }
            50% { transform: translateX(80px) rotate(180deg) scale(1.1); opacity: 0.85; }
            100% { top: 105vh; transform: translateX(130px) rotate(360deg) scale(0.8); opacity: 0; }
        }

        /* ЭФФЕКТ ВЫЛЕТАЮЩИХ СЕРДЕЧЕК ПРИ ОТКРЫТИИ */
        .heart-particle {
            position: fixed;
            pointer-events: none;
            z-index: 10001;
            will-change: transform, opacity;
            background: radial-gradient(circle at 35% 35%, #ff7675, #d63031);
            clip-path: path('M12 4.419c-2.426-3.484-7.208-3.484-9.633 0-2.508 3.612-2.508 9.471 0 13.084l9.633 9.497 9.633-9.497c2.508-3.613 2.508-9.472 0-13.084-2.425-3.484-7.207-3.484-9.633 0z');
            opacity: 1;
            transition: transform 2s cubic-bezier(0.1, 0.8, 0.3, 1), opacity 2s ease-out;
        }

        /* ЭКРАН С КОНВЕРТОМ */
        #envelope-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #EADEC9 0%, #D6C7B1 50%, #BFA785 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            transition: opacity 0.8s ease-in-out, transform 0.8s ease-in-out;
        }

        .envelope {
            width: 450px; 
            height: 290px;
            max-width: 90%;
            background: #FFFFFF; 
            box-shadow: 0 35px 80px rgba(0,0,0,0.2), inset 0 0 20px rgba(0,0,0,0.02);
            border-radius: 8px;
            position: relative;
            border: 1px solid #EAE2D5;
        }

        .envelope::before {
            content: '';
            position: absolute;
            top: 12px; left: 12px; right: 12px; bottom: 12px;
            border: 1px solid rgba(212, 175, 55, 0.35);
            pointer-events: none;
        }

        /* СУРГУЧНОЕ СЕРДЦЕ СТРОГО ПО ЦЕНТРУ КОНВЕРТА */
        .heart-seal {
            width: 120px;
            height: 110px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            justify-content: center;
            align-items: center;
            filter: drop-shadow(0 10px 22px rgba(178, 31, 31, 0.5));
            cursor: pointer;
            z-index: 10;
            transition: transform 0.3s ease;
        }
        .heart-seal:hover { transform: translate(-50%, -50%) scale(1.08); }

        .heart-seal-shape {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #E64C4C, #B21F1F, #7F0F0F);
            clip-path: path('M12 4.435c-1.989-5.399-12-4.597-12 3.568 0 4.068 3.06 6.028 12 14 8.94-7.972 12-9.932 12-14 0-8.165-10.011-8.967-12-3.568z');
            transform: scale(4.6);
            z-index: 1;
        }

        /* ИНИЦИАЛЫ СТРОГО ВНУТРИ СЕРДЦА */
        .heart-seal-text {
            position: relative;
            z-index: 2;
            color: #F9E7B9; 
            font-family: 'Great Vibes', cursive;
            font-weight: bold;
            font-size: 2.3rem;
            text-shadow: 1px 2px 4px rgba(0,0,0,0.6);
            margin-top: -5px;
        }

        .envelope-text {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.2rem;
            font-style: italic;
            color: #8A8475;
            position: absolute;
            bottom: 30px;
            width: 100%;
            text-align: center;
            font-weight: 600;
            z-index: 2;
        }

        /* СТИЛИ ДЛЯ ВНУТРЕННИХ СТРАНИЦ (ЧИСТЫЙ БЕЛЫЙ ФОН) */
        .page {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            padding: 30px 20px;
            overflow-y: auto;
            text-align: center;
            background-color: #FFFFFF; 
            justify-content: center;
            align-items: center;
            flex-direction: column;
            opacity: 0;
            z-index: 5;
        }
        .page.active { display: flex !important; animation: fadeInPage 0.6s ease-out forwards; }
        @keyframes fadeInPage { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        /* РОСКОШНЫЕ КАРТОЧКИ НА БЕЛОМ ФОНЕ */
        .content-card {
            width: 100%;
            max-width: 560px;
            margin: auto;
            padding: 40px 30px;
            background: #FFFFFF;
            border: 1px solid rgba(158, 132, 84, 0.25);
            box-shadow: 0 15px 45px rgba(158, 132, 84, 0.08);
            border-radius: 4px;
            position: relative;
            z-index: 6;
        }

        h2 { font-size: 1.9rem; color: #9E8454; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 20px; font-weight: 400; }
        
        .invitation-text {
            font-size: 1.25rem;
            line-height: 1.7;
            font-style: italic;
            color: #2A2F35;
            margin-bottom: 15px;
        }

        .hosts-title { font-family: 'Great Vibes', cursive; font-size: 2.6rem; color: #9E8454; margin-top: 25px; }
        .hosts-names { font-size: 1.5rem; letter-spacing: 1px; font-weight: 600; margin-top: 4px; color: #2A2F35; margin-bottom: 25px; }

        /* КНОПКИ НАВИГАЦИИ */
        .nav-box { display: flex; justify-content: center; gap: 15px; margin-top: 25px; width: 100%; }
        .btn-nav {
            padding: 12px 30px;
            background: #FFFFFF;
            border: 1px solid #9E8454;
            color: #9E8454;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            box-shadow: 0 4px 10px rgba(158, 132, 84, 0.1);
            font-weight: 500;
        }
        .btn-nav:hover { background: #9E8454; color: #FFFFFF; box-shadow: 0 5px 15px rgba(158, 132, 84, 0.3); transform: translateY(-1px); }

        /* ДИЗАЙН ТАЙМЕРА */
        .timer-grid { display: flex; justify-content: center; gap: 10px; margin: 20px 0; }
        .timer-item { background: #FFFFFF; border: 1px solid #EAE5DC; padding: 12px; min-width: 70px; box-shadow: 0 4px 8px rgba(0,0,0,0.02); }
        .timer-num { font-size: 1.6rem; color: #2A2F35; font-weight: 600; }
        .timer-label { font-family: 'Montserrat', sans-serif; font-size: 0.6rem; color: #8A94A0; text-transform: uppercase; letter-spacing: 1px; }

        /* ПАЛИТРА ДРЕСС-КОДА */
        .palette { display: flex; justify-content: center; gap: 12px; margin: 20px 0; }
        .circle { width: 36px; height: 36px; border-radius: 50%; border: 1px solid #E2E8F0; }

        /* КНИГА ПОЖЕЛАНИЙ */
        .wish-input, .wish-text { width: 100%; padding: 11px; margin-bottom: 10px; border: 1px solid #E2DCD0; background: #FFFFFF; font-family: 'Montserrat', sans-serif; font-size: 0.85rem; outline: none; color: #2A2F35; }
        .wish-text { height: 75px; resize: none; }
        .wishes-output { max-height: 140px; overflow-y: auto; text-align: left; font-size: 0.9rem; margin-top: 15px; width: 100%; }
        .wish-item { padding: 9px; border-left: 2px solid #9E8454; background: #FAFAFA; margin-bottom: 5px; font-style: italic; }

        /* ЗОНА ДЛЯ ФОТО */
        .upload-zone { border: 2px dashed #9E8454; padding: 25px 15px; cursor: pointer; background: #FFFFFF; margin-bottom: 15px; font-family: 'Montserrat', sans-serif; font-size: 0.85rem; color: #7A7469; }
        .gallery-preview { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 12px; width: 100%; }
        .gallery-preview img { width: 100%; height: 70px; object-fit: cover; border-radius: 2px; box-shadow: 0 3px 6px rgba(0,0,0,0.05); }

        /* КНОПКА ЗВУКА */
        #audio-toggle { position: fixed; bottom: 20px; right: 20px; background: #FFFFFF; border: 1px solid #9E8454; width: 46px; height: 46px; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; z-index: 9999; box-shadow: 0 4px 10px rgba(0,0,0,0.08); font-size: 1rem; }
        .hidden-player { position: absolute; width: 0; height: 0; border: 0; visibility: hidden; }
    </style>
</head>
<body>

    <div id="player" class="hidden-player"></div>

    <div id="audio-toggle" onclick="toggleAudio()">🎵</div>

    <div id="envelope-screen">
        <div class="envelope">
            <div class="heart-seal" onclick="openEnvelope(event)">
                <div class="heart-seal-shape"></div>
                <div class="heart-seal-text">S&A</div>
            </div>
            <div class="envelope-text">Нажмите на сердце, чтобы открыть</div>
        </div>
    </div>
